<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL v5.0 | Auto-Config</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');
        body { margin: 0; background: #020205; font-family: 'JetBrains Mono', monospace; color: #eee; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; filter: invert(100%) hue-rotate(180deg) brightness(0.4); z-index: 1; }
        .ui { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(6, 6, 10, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(220, 38, 38, 0.2); }
        input, select { background: #000 !important; border: 1px solid #444 !important; color: #fff !important; padding: 10px; border-radius: 4px; width: 100%; font-size: 12px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="ui">
        <header class="h-14 glass border-b border-red-900/40 flex items-center px-6 interactive justify-between">
            <h1 class="font-bold text-white tracking-widest uppercase">Sentinel<span class="text-red-600">.v5</span></h1>
            <div id="activeModel" class="text-[9px] text-gray-500 font-mono italic uppercase">Model: Searching...</div>
        </header>

        <main class="flex flex-grow overflow-hidden">
            <aside class="w-80 glass m-4 rounded-lg p-6 flex flex-col space-y-4 interactive shadow-2xl">
                <div>
                    <label class="text-[10px] text-red-500 font-bold block mb-1 uppercase">Şehir</label>
                    <input type="text" id="sehirInput" placeholder="Örn: Hatay">
                </div>
                <div>
                    <label class="text-[10px] text-red-500 font-bold block mb-1 uppercase">Afet</label>
                    <select id="afetTipi">
                        <option value="Deprem">Deprem</option>
                        <option value="Sel">Sel</option>
                        <option value="Yangın">Yangın</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-red-500 font-bold block mb-1 uppercase">Vaka Sayısı</label>
                    <input type="number" id="vakaSayisi" value="100">
                </div>
                <button onclick="calistir()" id="btn" class="w-full bg-red-800 hover:bg-red-700 text-white font-bold py-4 rounded transition-all shadow-lg active:scale-95">ANALİZİ BAŞLAT</button>
                <div id="log" class="text-[9px] text-green-500/50 font-mono h-32 bg-black/80 p-3 rounded border border-white/5 overflow-y-auto">
                    > System Booting...
                </div>
            </aside>

            <section class="flex-grow flex justify-end p-4">
                <div class="w-[450px] glass rounded-lg p-6 interactive shadow-2xl border-l-2 border-red-600">
                    <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                        <span class="text-[10px] text-white font-bold uppercase tracking-widest">Stratejik İstihbarat</span>
                        <div id="status" class="h-2 w-2 rounded-full bg-gray-600"></div>
                    </div>
                    <div id="cikti" class="text-[13px] leading-relaxed text-gray-300 h-[450px] overflow-y-auto pr-2 font-sans italic">
                        // Veri girişi bekleniyor...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        var map = L.map('map', {zoomControl: false}).setView([39.0, 35.0], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- BURAYA KENDİ ANAHTARINI YAZ ---
        const API_KEY = "AIzaSyC7q8IpEeRs9R34ZCQCszll3hAm1nOeuu0"; 

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function calistir() {
            const sehir = document.getElementById('sehirInput').value;
            const afet = document.getElementById('afetTipi').value;
            const vaka = document.getElementById('vakaSayisi').value;
            const cikti = document.getElementById('cikti');
            const btn = document.getElementById('btn');

            if(!sehir || API_KEY.includes("BURAYA")) { alert("Eksik veri!"); return; }

            btn.disabled = true;
            btn.innerText = "SİSTEM TARANIYOR...";
            log(`Analiz başlatıldı: ${sehir}`);

            try {
                // 1. HARİTA GÜNCELLEME
                const geo = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${sehir},Turkey`);
                const gData = await geo.json();
                if(gData.length > 0) map.flyTo([gData[0].lat, gData[0].lon], 11);

                // 2. KULLANILABİLİR MODELLERİ BUL (Kritik nokta)
                log("Erişilebilir modeller sorgulanıyor...");
                const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const listData = await listRes.json();

                if(!listData.models) throw new Error("API Anahtarı geçersiz veya yetkisiz.");

                // 'generateContent' destekleyen ilk uygun modeli seç
                const targetModel = listData.models.find(m => m.supportedGenerationMethods.includes('generateContent'));
                
                if(!targetModel) throw new Error("Hesabınızda uygun model bulunamadı.");
                
                document.getElementById('activeModel').innerText = `Model: ${targetModel.name.split('/').pop()}`;
                log(`Seçilen Model: ${targetModel.name}`);

                // 3. ANALİZ İSTEĞİ
                const prompt = `${sehir} ili için ${afet} durumunda ${vaka} yaralı varken teknik lojistik analiz yap. En hızlı 2 rota ve 3 güvenli bölge öner. Kısa yaz.`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${targetModel.name}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const finalData = await res.json();
                cikti.innerText = finalData.candidates[0].content.parts[0].text;
                document.getElementById('status').className = "h-2 w-2 rounded-full bg-red-600 shadow-[0_0_8px_red]";
                log("Analiz başarılı.");

            } catch (err) {
                cikti.innerText = "HATA: " + err.message;
                log("Kritik sistem hatası!");
            } finally {
                btn.disabled = false;
                btn.innerText = "STRATEJİ ÜRET";
            }
        }
    </script>
</body>
</html>
